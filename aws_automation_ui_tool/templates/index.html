<!DOCTYPE html>
<html>
<head>
    <title>AWS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3">
        <h4>⚙ AWS Panel</h4>
        <button class="btn btn-dark w-100 mb-2" onclick="loadEC2()">EC2</button>
        <button class="btn btn-dark w-100 mb-2" onclick="loadIAM()">IAM</button>
    </div>

    <!-- Main -->
    <div class="content p-4 w-100">
        <h3>Dashboard</h3>

        <input id="region" class="form-control mb-3" value="us-east-1">

        <div id="output"></div>

        <canvas id="chart" height="100"></canvas>
    </div>

</div>

<script>
async function loadEC2() {
    let region = document.getElementById("region").value;
    let res = await fetch(`/api/ec2?region=${region}`);
    let data = await res.json();

    let html = "<h4>EC2 Instances</h4><table class='table table-dark'>";
    html += "<tr><th>ID</th><th>State</th><th>Type</th></tr>";

    let runningCount = 0;

    data.forEach(i => {
        html += `<tr>
            <td>${i.id}</td>
            <td>${i.state}</td>
            <td>${i.type}</td>
        </tr>`;
        if (i.state === "running") runningCount++;
    });

    html += "</table>";
    document.getElementById("output").innerHTML = html;

    renderChart(runningCount, data.length - runningCount);
}

async function loadIAM() {
    let res = await fetch("/api/iam");
    let data = await res.json();

    let html = "<h4>IAM Users</h4><ul>";
    data.forEach(u => {
        html += `<li>${u}</li>`;
    });
    html += "</ul>";

    document.getElementById("output").innerHTML = html;
}

function renderChart(running, stopped) {
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Running', 'Stopped'],
            datasets: [{
                data: [running, stopped]
            }]
        }
    });
}
</script>

</body>
</html>
